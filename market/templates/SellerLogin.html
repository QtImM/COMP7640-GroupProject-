{% extends 'base.html' %}
{% block title %}{{ t('title_vendor_login') }}{% endblock %}

{% block content %}
<div class="auth-wrapper fade-in">
  <div class="auth-card mx-auto">
    <div class="text-center mb-5">
      <h3 class="text-bh-gold small font-weight-bold text-uppercase letter-spacing-2 mb-2">{{ t('artisan_studio') }}</h3>
      <h1 class="form-title">{{ t('login_title') }}</h1>
      <p class="text-muted small">{{ t('vendor_portal_sub') }}</p>
    </div>

    <form method="POST" action="">
      <div class="form-group mb-4">
        <label class="field-label">{{ t('email_label') }}</label>
        <input id="seller-login-email" type="email" class="market-input" placeholder="artisan@example.com" name="Email" required>
      </div>

      <div class="form-group mb-4">
        <label class="field-label">{{ t('password_label') }}</label>
        <input id="seller-login-password" type="password" class="market-input" placeholder="••••••••" name="Password" required>
      </div>

      <button type="submit" class="btn-primary-action w-100 mt-2">{{ t('login_btn') }}</button>
    </form>

    <div class="text-center mt-5 pt-4 border-top">
      <p class="small text-muted mb-2 font-italic">{{ t('no_account') }}</p>
      <a class="nav-link p-0 font-weight-bold" style="color: var(--bh-gold)" href="{{ url_for('sellerRegister') }}">{{ t('create_one') }} →</a>
      <a class="nav-link p-0 text-muted small font-weight-bold mt-3" href="{{ url_for('homePage') }}">← {{ t('back_to_homepage') }}</a>
    </div>
  </div>
</div>
{% endblock %}
